simulation:
  random_seed: 42
  dt: 0.1
  max_steps: 50
  total_runs: 100

environment:
  ego_start: [0.0, 0.0]
  ego_speed: 1.0
  obstacle_start: [6.0, 2.0]
  obstacle_velocity: [0.0, -0.5]
  goal: [10.0, 0.0]
  collision_threshold: 0.4

noise_model:
  degradation_probability: 0.1
  mu_nominal: [0.0, 0.0]
  sigma_nominal: 0.03
  mu_degraded: [0.1, -0.1]
  sigma_degraded: 0.6

estimator:
  num_particles: 200
  process_noise: 0.01      # motion_sigma
  measurement_noise: 0.03  # sensor_sigma
  resample_threshold: 0.5  # N_eff ratio

evaluation:
  breakdown_threshold_alpha: 0.05
  metrics: [collision_rate, cvar, breakdown_point]