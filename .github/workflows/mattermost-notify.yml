name: Notify Mattermost on Push

on:
  push:
    branches:
      - main
      - feat/environment

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send notification to Mattermost
        env:
          WEBHOOK_URL: ${{ secrets.MATTERMOST_WEBHOOK_URL }}
        run: |
          curl -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "### 🚀 New Code Push Detected\n**Repository:** `${{ github.repository }}`\n**Branch:** `${{ github.ref_name }}`\n**Author:** ${{ github.actor }}\n\n**Latest Commit:**\n> ${{ github.event.head_commit.message }}\n\n[🔗 View Comparison / Changes](${{ github.event.compare }})"
            }'